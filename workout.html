<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Workouts – Elite Fitness</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<link href="/css/theme.css" rel="stylesheet"/>
<style>
/* ── Hero ── */
.workout-hero{
  background:linear-gradient(135deg,var(--card),var(--card2));
  border:1px solid var(--teal-border);
  border-radius:var(--radius-xl);padding:28px 32px;margin-bottom:20px;
  position:relative;overflow:hidden;animation:fadeInUp .4s ease;
}
.workout-hero::before{content:'';position:absolute;right:-60px;top:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(0,212,184,.1),transparent 70%);border-radius:50%;pointer-events:none;}
.workout-hero::after{content:'';position:absolute;left:-30px;bottom:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(56,182,232,.06),transparent 70%);border-radius:50%;pointer-events:none;}
.workout-hero h1{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:5px;}
.workout-hero h1 i{color:var(--teal);margin-right:9px;}
.workout-hero p{font-size:13px;color:var(--text-2);margin-bottom:12px;line-height:1.6;}
.hero-goal-badge{display:inline-flex;align-items:center;gap:6px;background:var(--teal-soft);border:1px solid var(--teal-border);color:var(--teal);font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px;}

/* ── Recommended Banner ── */
.rec-banner{
  background:rgba(0,212,184,.05);border:1px solid var(--teal-border);
  border-radius:var(--radius-lg);padding:14px 20px;margin-bottom:18px;
  display:flex;align-items:center;gap:12px;
}
.rec-banner i{font-size:16px;color:var(--teal);}
.rec-banner-text h3{font-size:13px;font-weight:700;margin-bottom:1px;}
.rec-banner-text p{font-size:12px;color:var(--text-2);}

/* ── Filters ── */
.filter-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.search-box{flex:1;min-width:160px;position:relative;}
.search-box i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-2);font-size:12px;pointer-events:none;}
.search-box input{width:100%;padding:9px 11px 9px 34px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s;}
.search-box input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft);}
.filter-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.filter-btn:hover{border-color:var(--teal);color:var(--teal);}
.filter-btn.active{border-color:var(--red);color:var(--red);background:rgba(255,77,109,.08);}

/* ── Video Cards ── */
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
.video-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-xl);overflow:hidden;transition:all .2s;
  animation:fadeInUp .4s ease both;position:relative;
}
.video-card:hover{border-color:var(--teal-border);transform:translateY(-4px);box-shadow:var(--shadow-lg);}
.video-card.recommended{border-color:rgba(240,71,106,.25);}
.video-card.recommended::before{content:'★ For You';position:absolute;top:10px;left:10px;z-index:10;background:var(--red);color:#fff;font-size:9px;font-weight:800;padding:3px 9px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase;}

.video-thumb{position:relative;height:185px;background:#000;overflow:hidden;cursor:pointer;}
.video-thumb video{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.video-card:hover .video-thumb video{transform:scale(1.05);}
.video-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;transition:all .2s;}
.video-card:hover .video-overlay{background:rgba(0,0,0,.2);}
.play-btn{width:52px;height:52px;background:rgba(255,255,255,.95);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--red);transition:all .2s;box-shadow:0 6px 20px rgba(0,0,0,.5);}
.video-card:hover .play-btn{transform:scale(1.1);}
.video-level-badge{position:absolute;top:10px;right:10px;font-size:9px;font-weight:800;padding:3px 9px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;}
.level-b{background:rgba(0,230,200,.9);color:#051210;}
.level-i{background:rgba(255,209,102,.9);color:#000;}
.level-a{background:rgba(255,77,109,.9);color:#fff;}

.vc-body{padding:16px 18px;}
.vc-goal{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--red);background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.15);padding:3px 9px;border-radius:4px;margin-bottom:9px;text-transform:uppercase;letter-spacing:.5px;}
.vc-title{font-size:15px;font-weight:700;margin-bottom:5px;letter-spacing:-.1px;}
.vc-desc{font-size:12px;color:var(--text-2);line-height:1.6;margin-bottom:10px;}
.vc-meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;}
.vc-meta-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-2);}
.vc-meta-item i{color:var(--teal);font-size:10px;}
.vc-footer{display:flex;gap:6px;padding-top:10px;border-top:1px solid var(--border);}
.btn-watch{flex:1;padding:9px;background:var(--red);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;font-family:'Inter',sans-serif;}
.btn-watch:hover{background:var(--red-dark);transform:translateY(-1px);}
.btn-save{width:36px;height:36px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);transition:all .15s;font-size:13px;}
.btn-save:hover,.btn-save.saved{border-color:var(--red);color:var(--red);}

/* ── Video Player Modal ── */
.player-modal{position:fixed;inset:0;background:rgba(0,0,0,.97);backdrop-filter:blur(10px);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px;}
.player-modal.open{display:flex;}
.player-wrap{width:100%;max-width:860px;animation:modalIn .2s ease;}
.player-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.player-title{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.3px;}
.player-close{width:36px;height:36px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:13px;transition:all .15s;}
.player-close:hover{background:rgba(240,71,106,.2);border-color:var(--red);}
.player-video-wrap{position:relative;padding-bottom:56.25%;height:0;border-radius:14px;overflow:hidden;background:#000;}
.player-video-wrap video{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}

/* ── Custom Controls ── */
.player-controls{
  margin-top:14px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;padding:14px 18px;
}
.player-progress-wrap{margin-bottom:12px;}
.player-progress{
  width:100%;height:5px;
  background:rgba(255,255,255,.15);
  border-radius:10px;cursor:pointer;
  appearance:none;outline:none;
}
.player-progress::-webkit-slider-thumb{appearance:none;width:14px;height:14px;border-radius:50%;background:#00d4b8;cursor:pointer;box-shadow:0 0 6px rgba(0,212,184,.5);}
.player-progress::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#00d4b8;cursor:pointer;border:none;}
.player-time{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.4);margin-top:5px;}
.player-btns{display:flex;align-items:center;justify-content:center;gap:12px;}
.pc-btn{
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;font-size:14px;transition:all .15s;
}
.pc-btn:hover{background:rgba(0,212,184,.2);border-color:#00d4b8;color:#00d4b8;}
.pc-btn.play-pause{width:50px;height:50px;font-size:18px;background:rgba(0,212,184,.15);border-color:#00d4b8;color:#00d4b8;}
.pc-btn.play-pause:hover{background:rgba(0,212,184,.3);}
.player-vol-wrap{display:flex;align-items:center;gap:8px;margin-top:10px;}
.player-vol-wrap i{color:rgba(255,255,255,.4);font-size:13px;width:16px;}
.player-vol{
  flex:1;height:4px;background:rgba(255,255,255,.15);
  border-radius:10px;cursor:pointer;appearance:none;outline:none;
}
.player-vol::-webkit-slider-thumb{appearance:none;width:12px;height:12px;border-radius:50%;background:#00d4b8;cursor:pointer;}
.player-vol::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:#00d4b8;cursor:pointer;border:none;}

.player-info{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px;}
.player-info-item{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px;text-align:center;}
.player-info-item .pi-val{font-size:13px;font-weight:700;color:#fff;}
.player-info-item .pi-lbl{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}

@media(max-width:600px){.video-grid{grid-template-columns:1fr;}.player-info{grid-template-columns:1fr 1fr;}.player-btns{gap:8px;}}
</style>
</head>
<body>
<div class="app-layout">
  <div id="sidebarOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div style="display:flex;align-items:center;gap:8px;padding:14px 16px 4px;">
      <button onclick="history.back()" title="Go Back" style="background:transparent;border:1px solid var(--border);border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);flex-shrink:0;transition:all .15s;" onmouseover="this.style.borderColor='var(--teal)';this.style.color='var(--teal)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-2)'"><i class="fas fa-chevron-left" style="font-size:11px;"></i></button>
      <a href="/user/dashboard" class="sidebar-brand" style="margin:0;padding:0;flex:1;"><div class="brand-logo"><i class="fas fa-dumbbell"></i></div><span class="brand-text">Elite <span>Fitness</span></span></a>
    </div>
    <div class="sidebar-user">
      <div class="user-info"><div class="user-name" id="sidebarUserName">Loading...</div><div class="user-role">Member</div></div>
    </div>
    <nav class="sidebar-nav">
      <a href="/user/dashboard" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
      <a href="/user/workout" class="nav-item active"><i class="fas fa-dumbbell"></i> Workouts</a>
      <a href="/user/plane" class="nav-item"><i class="fas fa-utensils"></i> Diet Plans</a>
      <a href="/user/progress" class="nav-item"><i class="fas fa-chart-line"></i> Progress</a>
      <a href="/user/goal" class="nav-item"><i class="fas fa-bullseye"></i> My Goals</a>
      <a href="/user/profile" class="nav-item"><i class="fas fa-user"></i> Profile</a>
      <a href="/user/feedback" class="nav-item"><i class="fas fa-comment-dots"></i> Feedback</a>
      <a href="/user/settings" class="nav-item"><i class="fas fa-cog"></i> Settings</a>
    </nav>
    <div class="sidebar-footer"><button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button></div>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <header class="topbar">
      <button class="icon-btn menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
      <span class="topbar-title">Workout Plans</span>
      <div class="topbar-actions">
        <button class="icon-btn" onclick="Theme.toggle()"><i class="fas fa-sun" id="themeIcon"></i></button>

    <div class="page-content">
      <!-- Hero -->
      <div class="workout-hero">
        <h1><i class="fas fa-dumbbell"></i> Your Workout Plans</h1>

        <div class="hero-goal-badge" id="goalBadge" style="display:none;">
          <i class="fas fa-bullseye"></i><span id="goalText">Your Goal</span>

      <!-- Filters -->
      <div class="filter-row">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search workouts..." oninput="filterPlans()"/>

        <button class="filter-btn" onclick="setFilter('Stay Fit',this)">⚡ Stay Fit</button>
        <button class="filter-btn" onclick="setFilter('Flexibility',this)">🧘 Flexibility</button>
      </div>

      <!-- Video Grid -->
      <div class="video-grid" id="videoGrid">
        <div class="video-card"><div style="height:280px;" class="skeleton"></div></div>
        <div class="video-card"><div style="height:280px;" class="skeleton"></div></div>

</div>

<!-- Video Player Modal -->
<div class="player-modal" id="playerModal" onclick="handleModalClick(event)">
  <div class="player-wrap">
    <div class="player-header">
      <span class="player-title" id="playerTitle">Workout</span>
      <button class="player-close" onclick="closePlayer()"><i class="fas fa-times"></i></button>
    </div>
    <div class="player-video-wrap" id="playerVideoWrap"></div>

    <!-- Custom Controls -->
    <div class="player-controls">
      <div class="player-progress-wrap">
        <input type="range" class="player-progress" id="progressBar" value="0" min="0" step="0.1"/>
        <div class="player-time">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>
      <div class="player-btns">
        <button class="pc-btn" onclick="prevVideo()" title="Previous"><i class="fas fa-step-backward"></i></button>
        <button class="pc-btn" onclick="seekBack()" title="-10s"><i class="fas fa-undo"></i></button>
        <button class="pc-btn play-pause" id="playPauseBtn" onclick="togglePlay()"><i class="fas fa-play" id="playIcon"></i></button>
        <button class="pc-btn" onclick="seekForward()" title="+10s"><i class="fas fa-redo"></i></button>
        <button class="pc-btn" onclick="nextVideo()" title="Next"><i class="fas fa-step-forward"></i></button>
      </div>
      <div class="player-vol-wrap">
        <i class="fas fa-volume-up" id="volIcon"></i>
        <input type="range" class="player-vol" id="volumeBar" value="100" min="0" max="100"/>
      </div>
    </div>

    <div class="player-info" id="playerInfo"></div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
const user = EF.requireAuth('user');
let allPlans = [], activeFilter = '', savedPlans = JSON.parse(localStorage.getItem('ef_saved_' + (user?.email || '')) || '[]');

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  const ov = document.getElementById('sidebarOverlay');
  ov.style.display = ov.style.display === 'block' ? 'none' : 'block';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').style.display = 'none';
}

const levelClass = { 'Beginner': 'level-b', 'Intermediate': 'level-i', 'Advanced': 'level-a' };
const goalEmoji = { 'Lose Weight': '🔥', 'Build Muscle': '💪', 'Stay Fit': '⚡', 'Flexibility': '🧘' };

// ── Local video mapping by goal + level ─────────────────
// 10 local videos mapped to goal/level combinations
const LOCAL_VIDEO_MAP = {
  'Lose Weight':   { 'Beginner': '/videos/video.mp4',    'Intermediate': '/videos/Video2.mp4',   'Advanced': '/videos/video3.mp4'   },
  'Build Muscle':  { 'Beginner': '/videos/video4.mp4',   'Intermediate': '/videos/video5.mp4',   'Advanced': '/videos/videos6.mp4'  },
  'Stay Fit':      { 'Beginner': '/videos/videos7.mp4',  'Intermediate': '/videos/videos8.mp4',  'Advanced': '/videos/videos9.mp4'  },
  'Flexibility':   { 'Beginner': '/videos/videos10.mp4', 'Intermediate': '/videos/videos10.mp4', 'Advanced': '/videos/videos10.mp4' }
};

function getLocalVideo(goal, level) {
  const g = LOCAL_VIDEO_MAP[goal];
  if (!g) return '/videos/video.mp4';
  return g[level] || g['Beginner'] || '/videos/video.mp4';
}

// ── Map setup answers → workout level ───────────────────
// Q2 activity: Beginner / Lightly Active / Moderately Active / Very Active
// Q4 experience: New to workout / Some experience / Regular workout
// DB levels: Beginner / Intermediate / Advanced
function resolveLevel(activityLevel, setupAnswers) {
  // Try to get experience from setupAnswers
  let experience = '';
  try {
    const sa = typeof setupAnswers === 'string' ? JSON.parse(setupAnswers) : (setupAnswers || {});
    const expValues = ['New to workout', 'Some experience', 'Regular workout'];
    experience = Object.values(sa).find(v => expValues.includes(v)) || '';
  } catch(e) {}

  const expMap = {
    'New to workout':  'Beginner',
    'Some experience': 'Intermediate',
    'Regular workout': 'Advanced'
  };
  const actMap = {
    'Beginner':          'Beginner',
    'Lightly Active':    'Beginner',
    'Moderately Active': 'Intermediate',
    'Very Active':       'Advanced'
  };
  // Experience (Q4) takes priority over activity level (Q2)
  return expMap[experience] || actMap[activityLevel] || '';
}

async function loadPlans(goal = '', level = '') {
  let url = '/api/workoutplans';
  const params = [];
  if (goal)  params.push('goal='  + encodeURIComponent(goal));
  if (level) params.push('level=' + encodeURIComponent(level));
  if (params.length) url += '?' + params.join('&');
  try {
    const r = await fetch(url);
    allPlans = await r.json();
    renderPlans(allPlans);
  } catch(e) {
    document.getElementById('videoGrid').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h3>Failed to load</h3><p>Please refresh the page.</p></div>';
  }
}

function renderPlans(plans) {
  const grid = document.getElementById('videoGrid');
  if (!plans.length) {
    grid.innerHTML = '<div class="empty-state"><i class="fas fa-dumbbell"></i><h3>No workouts found</h3><p>Try a different filter or check back later.</p></div>';
    return;
  }
  const userGoal  = user.goal || '';
  const userLevel = resolveLevel(user.activityLevel || '', user.setupAnswers || '');
  grid.innerHTML = plans.map((p, i) => {
    const isRec = userGoal && p.goal && p.goal.toLowerCase().includes(userGoal.toLowerCase())
                  && (!userLevel || (p.level && p.level.toLowerCase() === userLevel.toLowerCase()));
    const isSaved = savedPlans.includes(p.id);
    const videoSrc = getLocalVideo(p.goal, p.level);
    const thumbHtml = `<video src="${videoSrc}" preload="metadata" muted style="width:100%;height:100%;object-fit:cover;"></video>`;

    return `
    <div class="video-card ${isRec ? 'recommended' : ''}" style="animation-delay:${(i % 6) * 0.08}s;">
      <div class="video-thumb" onclick="openPlayer(${p.id})">
        ${thumbHtml}
        <div class="video-overlay">
          <div class="play-btn"><i class="fas fa-play" style="margin-left:3px;"></i></div>
        </div>
        <span class="video-level-badge ${levelClass[p.level] || 'level-b'}">${p.level}</span>
      </div>
      <div class="vc-body">
        <div class="vc-goal">${goalEmoji[p.goal] || '🎯'} ${p.goal}</div>
        <div class="vc-title">${p.title}</div>
        <div class="vc-desc">${p.description || 'A great workout plan to help you reach your goals.'}</div>
        <div class="vc-meta">
          <div class="vc-meta-item"><i class="fas fa-clock"></i>${p.duration}</div>
          <div class="vc-meta-item"><i class="fas fa-calendar-alt"></i>${p.daysPerWeek}</div>
          <div class="vc-meta-item"><i class="fas fa-signal"></i>${p.level}</div>
        </div>
        <div class="vc-footer">
          <button class="btn-watch" onclick="openPlayer(${p.id})"><i class="fas fa-play-circle"></i> Watch Now</button>
          <button class="btn-save ${isSaved ? 'saved' : ''}" onclick="toggleSave(${p.id},this)" title="${isSaved ? 'Saved' : 'Save'}">
            <i class="fas fa-heart" style="color:${isSaved ? 'var(--red)' : 'inherit'};"></i>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setFilter(goal, btn) {
  activeFilter = goal;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('searchInput').value = '';
  // "All" — no filters, show everything
  if (!goal) {
    loadPlans('', '');
  } else {
    const lvl = resolveLevel(user.activityLevel || '', user.setupAnswers || '');
    loadPlans(goal, lvl);
  }
}

function filterPlans() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderPlans(allPlans.filter(p =>
    p.title.toLowerCase().includes(q) ||
    (p.description || '').toLowerCase().includes(q) ||
    p.goal.toLowerCase().includes(q) ||
    p.level.toLowerCase().includes(q)
  ));
}

let currentVideo = null;
let currentPlanIndex = 0;

function fmt(s) {
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function openPlayer(id) {
  const idx = allPlans.findIndex(x => x.id === id);
  if (idx === -1) return;
  currentPlanIndex = idx;
  loadVideoInPlayer(allPlans[idx]);
  document.getElementById('playerModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function loadVideoInPlayer(p) {
  document.getElementById('playerTitle').textContent = p.title;
  const wrap = document.getElementById('playerVideoWrap');
  // Use DB videoUrl if set, else fallback to local map
  const videoSrc = (p.videoUrl && p.videoUrl.trim()) ? p.videoUrl : getLocalVideo(p.goal, p.level);
  wrap.innerHTML = `<video id="mainVideo" src="${videoSrc}" preload="metadata" style="position:absolute;top:0;left:0;width:100%;height:100%;"></video>`;
  currentVideo = document.getElementById('mainVideo');

  // Reset controls
  document.getElementById('progressBar').value = 0;
  document.getElementById('currentTime').textContent = '0:00';
  document.getElementById('totalTime').textContent = '0:00';
  document.getElementById('playIcon').className = 'fas fa-play';

  currentVideo.addEventListener('loadedmetadata', () => {
    document.getElementById('progressBar').max = currentVideo.duration;
    document.getElementById('totalTime').textContent = fmt(currentVideo.duration);
  });
  currentVideo.addEventListener('timeupdate', () => {
    document.getElementById('progressBar').value = currentVideo.currentTime;
    document.getElementById('currentTime').textContent = fmt(currentVideo.currentTime);
  });
  currentVideo.addEventListener('ended', () => {
    document.getElementById('playIcon').className = 'fas fa-play';
  });
  currentVideo.addEventListener('play', () => {
    document.getElementById('playIcon').className = 'fas fa-pause';
  });
  currentVideo.addEventListener('pause', () => {
    document.getElementById('playIcon').className = 'fas fa-play';
  });

  // Volume
  const volBar = document.getElementById('volumeBar');
  currentVideo.volume = volBar.value / 100;
  volBar.oninput = () => {
    currentVideo.volume = volBar.value / 100;
    document.getElementById('volIcon').className = volBar.value == 0 ? 'fas fa-volume-mute' : 'fas fa-volume-up';
  };

  // Progress seek
  document.getElementById('progressBar').oninput = () => {
    currentVideo.currentTime = document.getElementById('progressBar').value;
  };

  currentVideo.play().catch(() => {});

  document.getElementById('playerInfo').innerHTML = `
    <div class="player-info-item"><div class="pi-val">${p.goal}</div><div class="pi-lbl">Goal</div></div>
    <div class="player-info-item"><div class="pi-val">${p.level}</div><div class="pi-lbl">Level</div></div>
    <div class="player-info-item"><div class="pi-val">${p.duration}</div><div class="pi-lbl">Duration</div></div>
    <div class="player-info-item"><div class="pi-val">${p.daysPerWeek}</div><div class="pi-lbl">Days/Week</div></div>`;
}

function togglePlay() {
  if (!currentVideo) return;
  currentVideo.paused ? currentVideo.play() : currentVideo.pause();
}

function seekBack() {
  if (currentVideo) currentVideo.currentTime = Math.max(0, currentVideo.currentTime - 10);
}

function seekForward() {
  if (currentVideo) currentVideo.currentTime = Math.min(currentVideo.duration, currentVideo.currentTime + 10);
}

function prevVideo() {
  if (allPlans.length === 0) return;
  currentPlanIndex = (currentPlanIndex - 1 + allPlans.length) % allPlans.length;
  loadVideoInPlayer(allPlans[currentPlanIndex]);
}

function nextVideo() {
  if (allPlans.length === 0) return;
  currentPlanIndex = (currentPlanIndex + 1) % allPlans.length;
  loadVideoInPlayer(allPlans[currentPlanIndex]);
}

function closePlayer() {
  if (currentVideo) { currentVideo.pause(); currentVideo = null; }
  document.getElementById('playerVideoWrap').innerHTML = '';
  document.getElementById('playerModal').classList.remove('open');
  document.body.style.overflow = '';
}

function handleModalClick(e) {
  if (e.target === document.getElementById('playerModal')) closePlayer();
}

function toggleSave(id, btn) {
  const idx = savedPlans.indexOf(id);
  if (idx === -1) {
    savedPlans.push(id);
    btn.classList.add('saved');
    btn.querySelector('i').style.color = 'var(--secondary)';
    Toast.show('Workout saved!', 'success');
  } else {
    savedPlans.splice(idx, 1);
    btn.classList.remove('saved');
    btn.querySelector('i').style.color = '';
    Toast.show('Removed from saved', 'info');
  }
  localStorage.setItem('ef_saved_' + user.email, JSON.stringify(savedPlans));
}

// Load plans — always sync from server first so edited answers are reflected
(async () => {
  const freshUser = await EF.syncProfile();
  const goal  = freshUser.goal || '';
  const level = resolveLevel(freshUser.activityLevel || '', freshUser.setupAnswers || '');

  if (goal) {
    document.getElementById('goalBadge').style.display = 'inline-flex';
    document.getElementById('goalText').textContent = goal + (level ? ` · ${level}` : '');
  }

  // Pre-select filter button matching user's goal
  if (goal) {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      const t = btn.textContent.trim();
      if (t.includes(goal) || (goal === 'Flexibility' && t.includes('Flexibility'))) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = goal;
      }
    });
  }

  loadPlans(goal, level);
})();
</script>
