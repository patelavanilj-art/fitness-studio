<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Logged Out – Elite Fitness</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0f0f1a;color:#e8e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:20px;padding:48px 40px;text-align:center;max-width:400px;width:100%;margin:20px;}
.icon{width:70px;height:70px;background:linear-gradient(135deg,#6c63ff,#ff6584);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;margin:0 auto 20px;}
h2{font-size:22px;font-weight:800;margin-bottom:8px;}
p{color:#8888aa;font-size:14px;margin-bottom:24px;}
a{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:linear-gradient(135deg,#6c63ff,#5a52d5);color:#fff;border-radius:10px;text-decoration:none;font-size:14px;font-weight:700;transition:all .2s;}
a:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(108,99,255,.4);}
</style>
</head>
<body>
<div class="card">
  <div class="icon"><i class="fas fa-sign-out-alt"></i></div>
  <h2>Signed Out</h2>
  <p>You have been successfully signed out of the admin panel.</p>
  <a href="/login"><i class="fas fa-sign-in-alt"></i> Sign In Again</a>
</div>
<script>localStorage.removeItem('ef_user');</script>
</body>
</html>
